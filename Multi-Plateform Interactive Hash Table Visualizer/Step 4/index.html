<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XHashtable Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        canvas {
            border: 1px solid black;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        input {
            width: 200px;
            padding: 5px;
        }
        button {
            padding: 6px 12px;
        }
    </style>
</head>
<body>
    <h2>XHashtable Visualizer</h2>
    <canvas id="canvas" width="800" height="630"></canvas>
    <div class="controls">
        <input
            type="text"
            id="keyInput"
            placeholder="Enter a key">
        <button id="insertButton">Insert</button>
        <button id="deleteButton">Delete</button>
        <button id="searchButton">Search</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
