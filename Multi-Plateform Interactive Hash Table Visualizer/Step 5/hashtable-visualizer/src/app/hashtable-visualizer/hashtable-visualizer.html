<div class="container">
  <h2>XHashtable Visualizer</h2>

  <div class="controls">
    <input [formControl]="keyControl" placeholder="Enter a key">
    <button (click)="onInsert()">Insert</button>
    <button (click)="onDelete()">Delete</button>
    <button (click)="onSearch()">Search</button>
  </div>

  <div class="visualization">
    <canvas #myCanvas></canvas>

    <div class="side-panel">
      <h3>Hash Table State</h3>

      <div *ngFor="let bucket of tableState; let i = index">
        <b>[{{ i }}]</b>

        <span *ngIf="bucket === null">
          Empty
        </span>

        <span *ngIf="bucket !== null">
          → {{ bucket.join(' → ') }}
        </span>
      </div>
    </div>
  </div>
</div>
